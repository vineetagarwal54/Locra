name: Android APK - EAS Local

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
      ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
      EAS_LOCAL_BUILD_WORKINGDIR: /tmp/eas-local-build
      EAS_LOCAL_BUILD_ARTIFACTS_DIR: /tmp/eas-local-artifacts
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android/sdk/ndk/*
          df -h

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: sdkmanager "ndk;27.3.13750724"

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npx expo-doctor
          npm run type-check
          npx eslint src tests --ext .ts,.tsx
          npm test

      - name: Build APK with EAS local
        run: npx eas-cli build --platform android --profile production-apk --local --non-interactive

      - name: Show artifacts
        if: always()
        run: find /tmp/eas-local-artifacts -maxdepth 2 -type f -print || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: locra-production-apk
          path: /tmp/eas-local-artifacts/**/*.apk
          if-no-files-found: error
